<!DOCTYPE html>
<html>
<head>
  <title>Student Project Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Student Project Management System  for IT Students</h1>

  <div class="form-box">
    <input type="text" id="studentName" placeholder="Student Name">
    <input type="text" id="title" placeholder="Project Title">
    <input type="text" id="technology" placeholder="Technology Used">

    <select id="status">
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
    </select>

    <button onclick="addProject()">Add Project</button>
  </div>

  <h2>Project List</h2>
  <table>
    <thead>
      <tr>
        <th>Student Name</th>
        <th>Project Name</th>
        <th>Technology</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="projectTable"></tbody>
  </table>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
